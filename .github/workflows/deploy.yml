name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  # Allows manual triggering for debugging
  workflow_dispatch:

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

# Opt into Node.js 24 to resolve deprecation warnings in your logs
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetches all history for all branches and tags to resolve Git 128 errors
          fetch-depth: 0 
          persist-credentials: false
          # Explicitly set submodules to false to avoid issues with missing .gitmodules
          submodules: false 

      - name: Fix Submodule Index Issue
        # Forcefully cleans the index of the ghost 'datahub' reference
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          if git ls-files --stage | grep -q "datahub"; then
            echo "Found datahub in index, removing..."
            git rm -r --cached datahub || true
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        # Using 'npm ci' is preferred for CI environments for cleaner installs
        run: npm install

      - name: Build
        # Added --emptyOutDir to ensure Vite starts with a clean slate
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          NODE_ENV: production

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Standard Vite build output directory
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
