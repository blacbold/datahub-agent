name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  # Allows manual triggering for debugging
  workflow_dispatch:

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

# Opt into Node.js 24 to resolve deprecation warnings in your logs
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetches all history for all branches and tags to resolve Git 128 errors
          fetch-depth: 0 
          persist-credentials: false
          # Explicitly set submodules to false to avoid issues with missing .gitmodules
          submodules: false 

      - name: Force Purge Ghost Submodule
        # Exhaustive cleanup for persistent submodule errors
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          if git ls-files --stage | grep -q "datahub"; then
            echo "Removing 'datahub' from git index..."
            git rm -r --cached datahub || true
          fi
          
          git config --local --unset-all submodule.datahub.url || true
          git config --local --remove-section submodule.datahub || true
          rm -rf .git/modules/datahub || true
          rm -rf datahub || true
          
          if [ -f .gitmodules ]; then
            sed -i '/\[submodule "datahub"\]/,/url =/d' .gitmodules || true
            if [ ! -s .gitmodules ]; then
               rm .gitmodules
            fi
          fi

      - name: Discover Project Root
        # Dynamically find where package.json lives
        id: info
        run: |
          PKG_PATH=$(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1)
          if [ -z "$PKG_PATH" ]; then
            echo "ERROR: Could not find package.json anywhere in the repository!"
            exit 1
          fi
          PROJECT_ROOT=$(dirname "$PKG_PATH")
          echo "Found package.json in: $PROJECT_ROOT"
          echo "root=$PROJECT_ROOT" >> $GITHUB_OUTPUT

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: '${{ steps.info.outputs.root }}/**/package-lock.json'

      - name: Check Project Structure
        run: |
          ROOT_DIR="${{ steps.info.outputs.root }}"
          echo "Listing files in discovered root ($ROOT_DIR):"
          ls -F "$ROOT_DIR"
          
          echo "Searching for index.html..."
          find . -name "index.html" -not -path "*/node_modules/*"
          
          echo "Validating package.json syntax..."
          node -e "
          try {
            const fs = require('fs');
            const content = fs.readFileSync('$ROOT_DIR/package.json', 'utf8');
            JSON.parse(content);
            console.log('package.json JSON is valid');
          } catch (e) {
            console.error('CRITICAL JSON ERROR: Your package.json is not valid JSON.');
            console.error('Message:', e.message);
            process.exit(1);
          }
          "

      - name: Install dependencies
        working-directory: ${{ steps.info.outputs.root }}
        run: npm install

      - name: Build
        working-directory: ${{ steps.info.outputs.root }}
        run: |
          # If index.html is in src/ but not root, copy it to root for Vite
          if [ ! -f index.html ] && [ -f src/index.html ]; then
            echo "Moving index.html from src/ to root for build..."
            cp src/index.html .
          fi

          # Verify if index.html exists in the current working directory
          if [ ! -f index.html ]; then
            echo "ERROR: index.html not found in $(pwd) or src/"
            echo "Vite requires index.html to be in the project root."
            echo "Current directory contents:"
            ls -F
            exit 1
          fi
          
          if grep -q '"build":' package.json; then
            npm run build
          else
            echo "ERROR: No 'build' script found in package.json."
            exit 1
          fi
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          NODE_ENV: production

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # IMPORTANT: Since your project is at the root (.), Vite outputs to ./dist by default.
          # We use the discovered root to find the dist folder correctly.
          path: '${{ steps.info.outputs.root }}/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
