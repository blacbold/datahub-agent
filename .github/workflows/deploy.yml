name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  # Allows manual triggering for debugging
  workflow_dispatch:

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

# Opt into Node.js 24 to resolve deprecation warnings in your logs
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetches all history for all branches and tags to resolve Git 128 errors
          fetch-depth: 0 
          persist-credentials: false
          # Explicitly set submodules to false to avoid issues with missing .gitmodules
          submodules: false 

      - name: Force Purge Ghost Submodule
        # This is a more exhaustive cleanup script to handle persistent submodule errors
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          echo "Checking for ghost submodule references..."
          
          # 1. Force remove 'datahub' from the Git index if it exists in any form
          if git ls-files --stage | grep -q "datahub"; then
            echo "Removing 'datahub' from git index..."
            git rm -r --cached datahub || true
          fi
          
          # 2. Unregister the submodule from the local git config
          # We use a broader approach to ensure no URL is expected
          git config --local --unset-all submodule.datahub.url || true
          git config --local --remove-section submodule.datahub || true
          
          # 3. Clean up the internal git modules directory and local folder
          rm -rf .git/modules/datahub || true
          rm -rf datahub || true
          
          # 4. Check for and remove any .gitmodules entries if they still exist
          if [ -f .gitmodules ]; then
            sed -i '/\[submodule "datahub"\]/,/url =/d' .gitmodules || true
            # If the file is now empty, remove it entirely
            if [ ! -s .gitmodules ]; then
               rm .gitmodules
            fi
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          NODE_ENV: production

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Standard Vite build output directory
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
