name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  # Allows manual triggering for debugging
  workflow_dispatch:

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

# Opt into Node.js 24 to resolve deprecation warnings in your logs
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetches all history for all branches and tags to resolve Git 128 errors
          fetch-depth: 0 
          persist-credentials: false
          # Explicitly set submodules to false to avoid issues with missing .gitmodules
          submodules: false 

      - name: Force Purge Ghost Submodule
        # Exhaustive cleanup for persistent submodule errors
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          if git ls-files --stage | grep -q "datahub"; then
            git rm -r --cached datahub || true
          fi
          
          git config --local --unset-all submodule.datahub.url || true
          git config --local --remove-section submodule.datahub || true
          rm -rf .git/modules/datahub || true
          rm -rf datahub || true
          
          if [ -f .gitmodules ]; then
            sed -i '/\[submodule "datahub"\]/,/url =/d' .gitmodules || true
            if [ ! -s .gitmodules ]; then
               rm .gitmodules
            fi
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          # Path to the lockfile in the nested directory for caching
          cache-dependency-path: 'datahub-agent/datahub-agent/package-lock.json'

      - name: Check Project Structure
        # Diagnostic step to debug the EJSONPARSE error and find files
        run: |
          echo "Listing files in the nested folder:"
          ls -F datahub-agent/datahub-agent/
          
          if [ -f datahub-agent/datahub-agent/package.json ]; then
            echo "Validating package.json syntax in nested folder..."
            node -e "
            try {
              const fs = require('fs');
              const content = fs.readFileSync('datahub-agent/datahub-agent/package.json', 'utf8');
              JSON.parse(content);
              console.log('package.json JSON is valid');
            } catch (e) {
              console.error('CRITICAL JSON ERROR: Your package.json is not valid JSON.');
              console.error('Message:', e.message);
              process.exit(1);
            }
            "
          else
            echo "ERROR: package.json not found in datahub-agent/datahub-agent/!"
            exit 1
          fi

      - name: Install dependencies
        # Run npm install inside the directory containing package.json
        working-directory: datahub-agent/datahub-agent
        run: npm install

      - name: Build
        # Run build inside the directory containing the source code and index.html
        working-directory: datahub-agent/datahub-agent
        run: |
          if grep -q '"build":' package.json; then
            npm run build
          else
            echo "ERROR: No 'build' script found in package.json."
            exit 1
          fi
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          NODE_ENV: production

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This assumes vite.config.js (below) outputs to the root dist folder
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
