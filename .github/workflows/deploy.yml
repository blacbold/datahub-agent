name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  # Allows manual triggering for debugging
  workflow_dispatch:

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

# Opt into Node.js 24 to resolve deprecation warnings in your logs
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetches all history for all branches and tags to resolve Git 128 errors
          fetch-depth: 0 
          persist-credentials: false
          # Explicitly set submodules to false to avoid issues with missing .gitmodules
          submodules: false 

      - name: Force Purge Ghost Submodule
        # If the index is corrupted with a submodule reference but no .gitmodules,
        # we need to remove it from the index and unregister it from git config.
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          echo "Checking for ghost submodule 'datahub'..."
          
          # 1. Remove from the Git index (cached paths)
          if git ls-files --stage | grep -q "datahub"; then
            echo "Removing 'datahub' from git index..."
            git rm -r --cached datahub || true
          fi
          
          # 2. Clean up any remaining configuration entries
          git config --local --remove-section submodule.datahub || true
          
          # 3. Physically remove any leftover directories in the runner
          rm -rf datahub
          rm -rf .git/modules/datahub

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          NODE_ENV: production

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Standard Vite build output directory
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
